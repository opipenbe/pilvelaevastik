apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-resourcequotas
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-resourcequota-update-delete-for-serviceaccounts
      match:
        any:
          - resources:
              kinds:
                - ResourceQuota
              namespaces:
                - shop
              operations:
                - UPDATE
                - DELETE
      preconditions:
        all:
          - key: "{{ request.userInfo.username }}"
            operator: StartsWith
            value: "system:serviceaccount:"
      validate:
        message: "Only approved Flux service accounts may modify or delete ResourceQuota."
        deny:
          conditions:
            all:
              - key: "{{ request.userInfo.username }}"
                operator: NotIn
                value:
                  - system:serviceaccount:flux-system:kustomize-controller
                  - system:serviceaccount:flux-system:helm-controller