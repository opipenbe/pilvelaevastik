apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-resourcequotas
  annotations:
    policies.kyverno.io/category: Workload Security and Governance Policies
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-resourcequota-update-delete
      match:
        any:
          - resources:
              kinds:
                - ResourceQuota
              operations:
                - UPDATE
                - DELETE
      validate:
        message: "Only approved service accounts may modify or delete ResourceQuota."
        deny:
          conditions:
            all:
              - key: "{{ request.userInfo.username }}"
                operator: AnyNotIn
                value:
                  - system:serviceaccount:flux-system:kustomize-controller
                  - system:serviceaccount:flux-system:helm-controller
