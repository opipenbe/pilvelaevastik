---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-443-trivy-operator
  namespace: trivy-system
spec:
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
      to:
        - ipBlock:
            cidr: 0.0.0.0/0
            # https://github.com/aquasecurity/trivy/discussions/10425
            except:
              - 45.148.10.212/32
  podSelector: {}
  policyTypes:
    - Egress

