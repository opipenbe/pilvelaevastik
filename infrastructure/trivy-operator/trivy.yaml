---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    #istio.io/dataplane-mode: ambient
  name: trivy-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: trivy-operator
  namespace: flux-system
spec:
  interval: 1m
  url: https://aquasecurity.github.io/helm-charts/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: flux-system
spec:
  serviceAccountName: kustomize-controller
  targetNamespace: trivy-system
  releaseName: trivy
  chart:
    spec:
      version: "0.32.1"
      chart: trivy-operator
      sourceRef:
        kind: HelmRepository
        name: trivy-operator
        namespace: flux-system
  interval: 1m
  timeout: 15m
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 1m
  values:
    excludeNamespaces: "cert-manager,cilium-secrets,default,flux-system,istio-system,kiali-operator,kube-node-lease,kube-public,kube-system,kubelet-serving-cert-approver,kyverno,longhorn-system,policy-reporter,trivy-adapter,trivy-system,velero"
  valuesFrom:
  - kind: ConfigMap
    name: trivy-operator-values
    valuesKey: values.yaml

