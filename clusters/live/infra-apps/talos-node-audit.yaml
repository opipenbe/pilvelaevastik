---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: talos-node-audit
  namespace: flux-system
spec:
  dependsOn:
    - name: kyverno
  interval: 10m
  path: ./infrastructure/talos-node-audit
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: talos-node-audit
