---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  dependsOn:
    - name: cilium
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: helm-controller
  path: ./infrastructure/longhorn
  prune: true
  wait: true
  timeout: 10m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
