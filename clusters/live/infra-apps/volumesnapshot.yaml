---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volumesnapshot
  namespace: flux-system
spec:
  dependsOn:
    - name: external-snapshotter
  interval: 720m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: kustomize-controller
  path: ./infrastructure/volumesnapshot
  prune: true
  wait: true
  timeout: 10m