---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trivy-adapter
  namespace: flux-system
spec:
  dependsOn:
    - name: kyverno
    - name: trivy-operator
    - name: kyverno-policies
  interval: 720m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  serviceAccountName: helm-controller
  path: ./infrastructure/trivy-adapter
  prune: true
  wait: true
  timeout: 10m
